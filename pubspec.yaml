name: bopomofo_game
description: "Bopomofo quiz game (A/B/C modes) with offline MOE dictionaries."
publish_to: "none"
version: 0.1.2+17
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_tts: ^4.0.2
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/db/moe_enhanced.db
    - assets/db/moe_raw.db
    - assets/icon/app_icon.png
    # 主題素材：有些 Flutter 版本/建置流程對「只列一層資料夾」的遞迴打包行為不一致，
    # 這裡改成逐一列出，避免主題 badge/hero/deco/icon 沒被打進 APK（會顯示破圖/不顯示角色）。
    - assets/themes/kuromi/
    - assets/themes/kuromi/icons/
    - assets/themes/cinnamoroll/
    - assets/themes/cinnamoroll/icons/
    - assets/themes/mymelody/
    - assets/themes/mymelody/icons/
    - assets/themes/carbot/
    - assets/themes/carbot/icons/
    - assets/themes/ultraman/
    - assets/themes/ultraman/icons/
