name: bopomofo_game
description: "Bopomofo quiz game (A/B/C modes) with offline MOE dictionaries."
publish_to: "none"
version: 0.1.2+9

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/db/moe_enhanced.db
    - assets/db/moe_raw.db
    - assets/icon/app_icon.png
